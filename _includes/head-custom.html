<!-- Custom nav links added below site title in sidebar -->
<style>
  .site-nav-extra {
    margin-top: 1rem;
    padding-top: .8rem;
    border-top: 1px solid rgba(255,255,255,.2);
  }
  .site-nav-extra a {
    display: block;
    color: #d4edaa;
    font-size: .88rem;
    padding: .25rem 0;
    text-decoration: none;
    transition: color .15s;
  }
  .site-nav-extra a:hover { color: #fff; }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var header = document.getElementById('header_wrap');
    if (!header) return;
    var nav = document.createElement('nav');
    nav.className = 'site-nav-extra';
    nav.innerHTML =
      '<a href="/sachluoc/">📚 Tất cả sách</a>' +
      '<a href="/sachluoc/danh-muc/">🗂️ Danh mục</a>';
    header.querySelector('.inner') && header.querySelector('.inner').appendChild(nav);
  });
</script>
